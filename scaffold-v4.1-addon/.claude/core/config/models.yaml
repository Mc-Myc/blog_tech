# Registre des modèles — source de vérité OPÉRATIONNELLE du routing.
# La politique (pourquoi ces niveaux) : ADR-006. Les signaux d'escalade : mythos-triggers.md.
# Vérifié contre la doc Anthropic le 2026-07-03. À revalider à chaque sortie de modèle.

version: 1

ladder:
  mecanique:
    model: claude-haiku-4-5-20251001
    nom: "Claude Haiku 4.5"
    expert_de: "volume, rapide, mécanique — extraction, classification, formatage, résumés courts, checks de /lint"
    contexte: 200k
    fallback: courant

  courant:
    model: claude-sonnet-5           # sorti le 2026-06-30 — à valider sur tes tâches (cf. ADR-006 §calibration)
    nom: "Claude Sonnet 5"
    expert_de: "courant, interactif — chunks de dev standards, wizards, premiers jets, gates @evaluator par défaut"
    contexte: 1M
    fallback: jugement

  jugement:
    model: claude-opus-4-8
    nom: "Claude Opus 4.8"
    expert_de: "complexe, jugement — @architect, @auditor, @critic, rédaction de specs, chunks difficiles, agentique long-horizon"
    contexte: 1M
    fallback: courant                # dégradation consciente, journalisée

  escalade:
    model: claude-fable-5
    nom: "Claude Fable 5"
    expert_de: "escalade consciente uniquement — signaux A-E de mythos-triggers, jamais par défaut, jamais interactif"
    contexte: 1M
    fallback: jugement               # comportement aligné sur l'API : Fable peut décliner (classifieurs) → retomber sur Opus

# Affectation des agents (reportée dans le frontmatter `model:` de chaque agent)
agents:
  architect: jugement
  auditor: jugement
  critic: jugement
  evaluator: courant       # gates fréquentes en /run-spec = sensible au coût ; escalade vers `jugement` si enjeu: eleve|critique
  memory-keeper: mecanique

# Règles de dispatch (détail : skill model-dispatch)
dispatch:
  defaut_spec: jugement            # une spec sans tier explicite
  defaut_chunk: herite_de_la_spec  # un chunk sans tier hérite du tier de sa spec
  escalade_requiert_signal: true   # niveau `escalade` interdit sans signal A-E documenté
  journaliser_fallbacks: core/memory/escalations.md

# Extensions hors-Claude (locaux, ChatGPT) : pack `providers-externes` (désactivé par défaut).
# Rien dans le scaffold ne dépend d'elles.
